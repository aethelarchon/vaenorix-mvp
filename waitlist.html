<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Vaenorix - Join Waitlist</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .waitlist-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
        }
        .waitlist-title {
            font-size: 36px;
            margin-bottom: 20px;
        }
        .waitlist-desc {
            color: #aaa;
            margin-bottom: 40px;
        }
        .email-input, .name-input {
            width: 100%;
            padding: 16px;
            border-radius: 50px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
        }
        .join-btn {
            width: 100%;
            padding: 16px;
            border-radius: 50px;
            background: linear-gradient(135deg, #00ffff, #0066ff);
            border: none;
            font-size: 18px;
            font-weight: bold;
            color: #0a0a0f;
            cursor: pointer;
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            display: none;
        }
        .success {
            background: rgba(0,255,0,0.1);
            border: 1px solid rgba(0,255,0,0.3);
            color: #00ff00;
        }
        .error {
            background: rgba(255,0,0,0.1);
            border: 1px solid rgba(255,0,0,0.3);
            color: #ff6666;
        }
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #00ffff;
            text-decoration: none;
        }
        .back-link i {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="logo">
                <i class="fas fa-brain logo-icon"></i>
                <span class="logo-text">Vaenorix</span>
            </div>
            <div class="nav-badge">Join Beta</div>
        </nav>

        <div class="waitlist-container">
            <h1 class="waitlist-title"><i class="fas fa-rocket"></i> Be the First to Try</h1>
            <p class="waitlist-desc">Vaenorix is launching soon. Join the waitlist to get early access.</p>
            
            <form id="waitlistForm" action="https://formspree.io/f/xjgzkjqv" method="POST">
                <input type="text" name="name" id="nameInput" class="name-input" placeholder="Your name (optional)">
                <input type="email" name="email" id="emailInput" class="email-input" placeholder="Your email address *" required>
                <button type="submit" class="join-btn" id="joinBtn"><i class="fas fa-envelope"></i> Join Waitlist</button>
            </form>
            
            <div id="messageBox" class="message"></div>
            <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <footer class="footer">
        <p>Vaenorix — Your AI Second Brain</p>
        <p class="footer-small">Save anything. Find everything later.</p>
    </footer>

    <script>
        const form = document.getElementById('waitlistForm');
        const messageBox = document.getElementById('messageBox');

        form.addEventListener('submit', function(event) {
            event.preventDefault();
            
            const email = document.getElementById('emailInput').value.trim();
            if (!email) {
                showMessage('Please enter your email address', 'error');
                return;
            }
            
            const submitBtn = document.getElementById('joinBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Submitting...';
            
            fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: { 'Accept': 'application/json' }
            })
            .then(response => {
                if (response.ok) {
                    showMessage('You\'re on the list! We\'ll notify you when Vaenorix launches.', 'success');
                    form.reset();
                } else {
                    showMessage('Something went wrong. Please try again.', 'error');
                }
            })
            .catch(() => {
                showMessage('Network error. Please check your connection.', 'error');
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-envelope"></i> Join Waitlist';
            });
        });

        function showMessage(msg, type) {
            messageBox.textContent = msg;
            messageBox.className = `message ${type}`;
            messageBox.style.display = 'block';
            setTimeout(() => {
                messageBox.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
            </html>
