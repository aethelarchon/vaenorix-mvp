<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

window.auth = getAuth(app);
window.signInWithPopup = signInWithPopup;
window.GoogleAuthProvider = GoogleAuthProvider;
window.onAuthStateChanged = onAuthStateChanged;
  window.collection = collection;
  window.addDoc = addDoc;

<body>

    <div class="container">
        <!-- Navbar -->
        <nav class="navbar">
    <div class="logo">
        <span class="logo-icon">🧠</span>
        <span class="logo-text">Vaenorix</span>
    </div>
    <div style="display: flex; gap: 10px; align-items: center;">
        <div class="nav-badge">AI Beta</div>
        <button id="loginBtn" class="login-btn">🔐 Sign in</button>
        <button id="logoutBtn" class="logout-btn" style="display:none;">🚪 Sign Out</button>
    </div>
        </nav>

        <!-- Hero Section -->
        <section class="hero">
            <h1 class="hero-title">
                Your <span class="glow-text">AI Second Brain</span>
            </h1>
            <p class="hero-desc">
                Save anything from the internet. Find everything later.<br>
                Your digital memory, forever organized.
            </p>
            <button class="btn-primary" id="getStartedBtn">
                ✨ Start Saving Memories
            </button>
        </section>

        <!-- Save Memory Section -->
        <section class="save-section">
            <h2 class="section-title">💾 Save Memory</h2>
            <div class="input-group">
                <input type="text" id="noteInput" placeholder="Write a note... e.g., 'Startup idea: AI bookmark manager'">
                <input type="text" id="linkInput" placeholder="Or paste a link... e.g., https://example.com">
                <button class="btn-save" id="saveBtn">
                    🔖 Save to Second Brain
                </button>
            </div>
        </section>

        <!-- AI Search Section -->
        <section class="search-section">
            <h2 class="section-title">🔍 AI Search</h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder='Try: "business idea" or "AI tool"'>
                <button class="btn-search" id="searchBtn">
                    ⚡ Search Memory
                </button>
            </div>
        </section>

        <!-- Saved Memories Section -->
        <section class="memories-section">
            <h2 class="section-title">📚 Saved Memories</h2>
            <div id="memoriesList" class="memories-list">
                <!-- এখানে কার্ড দেখাবে -->
            </div>
        </section>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>Vaenorix — Your AI Second Brain</p>
        <p class="footer-small">Save anything. Find everything later.</p>
    </footer>
