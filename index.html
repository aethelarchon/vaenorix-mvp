    <!-- Firebase SDK -->
    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
      import { getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc, query, orderBy } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';
      import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';
      
      const firebaseConfig = {
        apiKey: "AIzaSyBFsjAzJU6CaCxz_NK3BU0ct5kGN91uqpc",
        authDomain: "vaenorix.firebaseapp.com",
        projectId: "vaenorix",
        storageBucket: "vaenorix.firebasestorage.app",
        messagingSenderId: "729849613491",
        appId: "1:729849613491:web:aec60b0b4e51129b8734c6",
        measurementId: "G-PCRQMNP32M"
      };
      
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const auth = getAuth(app);
      
      window.db = db;
      window.auth = auth;
      window.signInWithPopup = signInWithPopup;
      window.GoogleAuthProvider = GoogleAuthProvider;
      window.onAuthStateChanged = onAuthStateChanged;
      window.collection = collection;
      window.addDoc = addDoc;
      window.getDocs = getDocs;
      window.deleteDoc = deleteDoc;
      window.doc = doc;
      window.query = query;
      window.orderBy = orderBy;
      window.updateDoc = updateDoc;

<body>

    <div class="container">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="logo">
                <i class="fas fa-brain logo-icon"></i>
                <span class="logo-text">Vaenorix</span>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <div class="nav-badge">AI Beta</div>
                <button id="loginBtn" class="login-btn"><i class="fas fa-sign-in-alt"></i> Sign in</button>
                <button id="logoutBtn" class="logout-btn" style="display:none;"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
            </div>
        </nav>

        <!-- Hero Section -->
        <section class="hero">
            <h1 class="hero-title">
                Your <span class="glow-text">AI Second Brain</span>
            </h1>
            <p class="hero-desc">
                Save anything from the internet. Find everything later.<br>
                Your digital memory, forever organized.
            </p>
            <button class="btn-primary" id="getStartedBtn">
                <i class="fas fa-rocket"></i> Start Saving Memories
            </button>
            <a href="/waitlist.html" class="btn-waitlist"><i class="fas fa-envelope"></i> Join Waitlist for Early Access</a>
        </section>

        <!-- Save Memory Section -->
        <section class="save-section">
            <h2 class="section-title"><i class="fas fa-database"></i> Save Memory</h2>
            <div class="input-group">
                <input type="text" id="noteInput" placeholder="Write a note... e.g., 'Startup idea: AI bookmark manager'">
                <input type="text" id="linkInput" placeholder="Or paste a link... e.g., https://example.com">
                <button class="btn-save" id="saveBtn">
                    <i class="fas fa-save"></i> Save to Second Brain
                </button>
            </div>
        </section>

        <!-- AI Search Section -->
        <section class="search-section">
            <h2 class="section-title"><i class="fas fa-microchip"></i> AI Search</h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder='Try: "business idea" or "AI tool"'>
                <button class="btn-search" id="searchBtn">
                    <i class="fas fa-search"></i> Search Memory
                </button>
            </div>
        </section>

        <!-- Saved Memories Section -->
        <section class="memories-section">
            <h2 class="section-title"><i class="fas fa-folder-open"></i> Saved Memories</h2>
            <div id="memoriesList" class="memories-list">
                <!-- এখানে কার্ড দেখাবে -->
            </div>
        </section>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>Vaenorix — Your AI Second Brain</p>
        <p class="footer-small">Save anything. Find everything later.</p>
    </footer>

    <script src="script.js"></script>
</body>
    </html>
